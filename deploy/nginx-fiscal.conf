# ============================================================
# nginx — Fiscalização de Linhas Sambaíba G3
# Adicionar em /etc/nginx/sites-available/fiscal
# e habilitar: ln -s /etc/nginx/sites-available/fiscal /etc/nginx/sites-enabled/
#
# Fica no mesmo servidor que o Gestão de Pátio v3.
# - Frontend:  /fiscal/        → dist/ estático do React
# - API:       /fiscal/api/    → uvicorn :8001
# ============================================================

server {
    listen 80;
    server_name _;          # substitua pelo seu domínio quando tiver

    # ── Frontend React (arquivos estáticos) ──────────────────
    location /fiscal/ {
        alias /opt/fiscal-sambaiba/dist/;
        try_files $uri $uri/ /fiscal/index.html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── API FastAPI (proxy para uvicorn) ─────────────────────
    location /fiscal/api/ {
        proxy_pass         http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;

        # Upload de escala até 20MB
        client_max_body_size 20M;
    }

    # ── Docs Swagger (apenas em dev — remover em prod) ───────
    location /fiscal/api/docs {
        proxy_pass http://127.0.0.1:8001/api/docs;
    }
}
