<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fiscal-sambaiba</title>
    <script type="module" crossorigin src="/assets/index-DQKWVWsR.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CLqFbEE1.css">
    <script>
      window.__terminal = null;
      document.addEventListener('DOMContentLoaded', function () {
        var overlay = document.createElement('div');
        overlay.id = '__terminal_overlay';
        overlay.style.cssText = [
          'position:fixed;top:0;left:0;right:0;bottom:0',
          'background:rgba(17,24,39,0.85)',
          'display:flex;align-items:center;justify-content:center',
          'z-index:99999;font-family:system-ui,sans-serif'
        ].join(';');
        overlay.innerHTML = `
          <div style="background:#fff;border-radius:16px;padding:28px 24px;max-width:320px;width:92%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)">
            <div style="font-size:28px;margin-bottom:4px">🚍</div>
            <h2 style="font-size:17px;font-weight:700;color:#1e40af;margin:0 0 4px">Fiscal Sambaíba</h2>
            <p style="color:#6b7280;font-size:13px;margin:0 0 20px">Selecione onde você está fiscalizando:</p>
            <div style="display:flex;gap:10px">
              <button onclick="__selectTerminal('TP')" style="flex:1;padding:14px 8px;background:#1d4ed8;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;line-height:1.3">
                TP<br><span style="font-size:11px;font-weight:400;opacity:.85">Cem. Pq. dos Pinheiros</span>
              </button>
              <button onclick="__selectTerminal('TS')" style="flex:1;padding:14px 8px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;line-height:1.3">
                TS<br><span style="font-size:11px;font-weight:400;opacity:.85">Metrô Santana</span>
              </button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
      });
      function __selectTerminal(t) {
        window.__terminal = t;
        var el = document.getElementById('__terminal_overlay');
        if (el) el.remove();
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
